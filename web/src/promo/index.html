<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pensieve · Processing Status</title>
    <script>
      (function () {
        try {
          // Deterministic: theme comes from ?theme=light|dark (default light),
          // not localStorage / OS — so exported promo images are reproducible.
          var t = new URLSearchParams(location.search).get('theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
